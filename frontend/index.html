
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Website Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #181c24;
      color: #fff;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100vw;
      height: 100%;
      padding: 0;
    }
    .header {
      width: 100vw;
      background: #23283a;
      padding: 24px 0 12px 0;
      text-align: center;
      box-shadow: 0 2px 12px #0003;
    }
    .header h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 700;
    }
    .header h2 {
      margin: 8px 0 0 0;
      font-size: 1.2rem;
      font-weight: 400;
      color: #b3b8c7;
    }
    .chat-area {
      flex: 1;
      width: 100vw;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 0 0 16px 0;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      background: #20243a;
      border-radius: 12px;
      padding: 24px 18px 18px 18px;
      margin: 18px 0 0 0;
      min-height: 320px;
      max-height: 60vh;
      box-shadow: 0 2px 12px #0002;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg { margin: 0; display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.ai { justify-content: flex-start; }
    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 1.08rem;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 2px 8px #0002;
    }
    .bubble.user {
      background: linear-gradient(90deg, #4f8cff, #3461a4);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      background: #2a2f4a;
      color: #fff;
      border-bottom-left-radius: 4px;
    }
    .bubble.status {
      background: #23283a;
      color: #ffb84f;
      font-style: italic;
      border-radius: 8px;
      margin: 0 auto;
      box-shadow: none;
    }
    .bubble.error {
      background: #ff4f8c;
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      margin: 0 auto;
      box-shadow: none;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      width: 100%;
    }
    input {
      flex: 1;
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #23283a;
      color: #fff;
    }
    button {
      background: #4f8cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active { background: #3461a4; }
    .mic { background: #ff4f8c; margin-left: 0; }
    .mic.active { background: #ffb84f; color: #23283a; }
    .mic svg { vertical-align: middle; }
    #copyBtn {
      margin-top: 14px;
      width: 100%;
      font-size: 1.05rem;
      background: #4f8cff;
    }
    #status {
      margin-top: 12px;
      text-align: center;
      font-size: 1.05em;
      min-height: 24px;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #23283a;
      border-radius: 6px;
      margin: 10px 0 0 0;
      overflow: hidden;
      position: relative;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #4f8cff, #ffb84f);
      width: 0%;
      transition: width 0.3s;
    }
    .connection {
      margin: 0 auto 10px auto;
      text-align: center;
      font-size: 1.05em;
      color: #ffb84f;
      min-height: 24px;
    }
    @media (max-width: 700px) {
      .chat-area { max-width: 100vw; }
      .bubble { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="header">
      <h1>AI Website Builder</h1>
      <h2>Build websites with natural language and AI</h2>
    </div>
    <div class="chat-area">
      <div class="connection" id="connectionStatus">Connecting...</div>
      <div id="chat"></div>
      <div class="progress-bar" id="progressBar" style="display:none;">
        <div class="progress-bar-inner" id="progressBarInner"></div>
      </div>
      <div class="input-row">
        <input id="msg" type="text" placeholder="Type your website idea or question..." autocomplete="off" />
        <button id="sendBtn">Send</button>
        <button class="mic" id="micBtn" title="Speak"><svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path d="M10 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V19a1 1 0 1 0 2 0v-1.07A7 7 0 0 0 17 11z"/></svg></button>
      </div>
      <button id="copyBtn">Copy Chat Logs</button>
      <div id="status"></div>
    </div>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const micBtn = document.getElementById('micBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressBarInner = document.getElementById('progressBarInner');
    const connectionStatus = document.getElementById('connectionStatus');
    let ws;
    let recognizing = false;
    let recognition;
    let waiting = false;
    let lastUserMsg = '';

    // Log buffer for detailed logs
    let logBuffer = [];
    function appendMsg(text, sender, type = '') {
      const div = document.createElement('div');
      div.className = 'msg ' + sender;
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + sender + (type ? ' ' + type : '');
      bubble.innerHTML = text;
      div.appendChild(bubble);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      // Add to log buffer with timestamp and type
      logBuffer.push({
        time: new Date().toISOString(),
        sender,
        type,
        text: (typeof text === 'string' ? text.replace(/<[^>]+>/g, '') : text)
      });
    }

    function setStatus(msg, type = '') {
      statusDiv.textContent = msg;
      statusDiv.style.color = type === 'error' ? '#ff4f8c' : (type === 'success' ? '#4f8cff' : '#fff');
      logBuffer.push({
        time: new Date().toISOString(),
        sender: 'status',
        type,
        text: msg
      });
    }

    function setConnectionStatus(msg, type = '') {
      connectionStatus.textContent = msg;
      connectionStatus.style.color = type === 'error' ? '#ff4f8c' : (type === 'success' ? '#4f8cff' : '#ffb84f');
      logBuffer.push({
        time: new Date().toISOString(),
        sender: 'connection',
        type,
        text: msg
      });
    }

    function setWaiting(isWaiting, progress = 0, progressMsg = '') {
      waiting = isWaiting;
      msgInput.disabled = isWaiting;
      sendBtn.disabled = isWaiting;
      if (isWaiting) {
        setStatus(progressMsg || 'AI is thinking...');
        progressBar.style.display = 'block';
        progressBarInner.style.width = (progress * 100) + '%';
      } else {
        setStatus('');
        progressBar.style.display = 'none';
        progressBarInner.style.width = '0%';
      }
    }

    function streamResponseStart() {
      appendMsg('AI is responding...', 'ai', 'status');
    }
    function streamResponseUpdate(token) {
      // Find last AI bubble and append
      const aiBubbles = chat.querySelectorAll('.msg.ai .bubble.ai');
      if (aiBubbles.length) {
        aiBubbles[aiBubbles.length - 1].innerHTML += token;
        chat.scrollTop = chat.scrollHeight;
      }
    }
    function streamResponseEnd() {
      // No-op for now (could add animation)
    }

    function sendMsg(text) {
      const val = text || msgInput.value;
      if (!val || waiting || !ws || ws.readyState !== 1) return;
      appendMsg(val, 'user');
      setWaiting(true, 0.1, 'AI is thinking...');
      streamResponseStart();
      try {
        ws.send(val);
        lastUserMsg = val;
      } catch (e) {
        setStatus('Failed to send message.', 'error');
        setWaiting(false);
        streamResponseEnd();
      }
      msgInput.value = '';
    }

    function copyChatLogs() {
      let logs = '';
      logBuffer.forEach(entry => {
        logs += `[${entry.time}] [${entry.sender}${entry.type ? '/' + entry.type : ''}] ${entry.text}\n`;
      });
      navigator.clipboard.writeText(logs.trim()).then(() => {
        setStatus('Detailed logs copied!', 'success');
      }, () => {
        setStatus('Failed to copy logs.', 'error');
      });
    }

    function setupWS(retry = 0) {
      setConnectionStatus('Connecting...');
      const wsProto = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      const wsHost = window.location.hostname + (window.location.port ? ':' + window.location.port : '');
      ws = new WebSocket(wsProto + wsHost);
      ws.onopen = () => {
        setConnectionStatus('Connected!', 'success');
        appendMsg('Connected to AI Website Builder!', 'ai', 'status');
      };
      ws.onmessage = (e) => {
        let data = e.data;
        try {
          const obj = JSON.parse(data);
          if (obj.type === 'progress') {
            setWaiting(true, obj.progress, obj.status || 'AI is working...');
            if (obj.status) appendMsg(`<b>Step:</b> ${obj.status}`, 'ai', 'status');
            if (obj.token) streamResponseUpdate(obj.token);
            return;
          } else if (obj.type === 'stream') {
            streamResponseUpdate(obj.token || '');
            return;
          } else if (obj.type === 'error') {
            setStatus(obj.message || 'AI error.', 'error');
            let errorDetails = '';
            if (obj.error) {
              errorDetails += `<br/><b>Name:</b> ${obj.error.name || ''}`;
              if (obj.error.stack) errorDetails += `<br/><b>Stack:</b><pre style='white-space:pre-wrap;max-width:100%;overflow-x:auto;'>${obj.error.stack}</pre>`;
              if (obj.error.details && typeof obj.error.details === 'object') {
                errorDetails += `<br/><b>Details:</b> <pre style='white-space:pre-wrap;max-width:100%;overflow-x:auto;'>${JSON.stringify(obj.error.details, null, 2)}</pre>`;
              }
            }
            appendMsg(`<b>Error:</b> ${obj.message} <button onclick='retryLastStep()'>Retry</button>${errorDetails}`, 'ai', 'error');
            setWaiting(false);
            streamResponseEnd();
            return;
          } else if (obj.type === 'done') {
            setWaiting(false);
            streamResponseEnd();
            appendMsg('<b>All steps complete!</b>', 'ai', 'status');
            return;
          }
        } catch (err) {
          // Not JSON, treat as plain message
        }
        streamResponseEnd();
        appendMsg(data, 'ai');
        setWaiting(false);
      };
      ws.onclose = () => {
        setConnectionStatus('Disconnected from server.', 'error');
        appendMsg('Disconnected from server.', 'ai', 'error');
        setWaiting(false);
        streamResponseEnd();
        if (retry < 5) setTimeout(() => setupWS(retry + 1), 2000);
      };
      ws.onerror = (e) => {
        setConnectionStatus('WebSocket error.', 'error');
        setWaiting(false);
        streamResponseEnd();
      };
    }

    function retryLastStep() {
      if (lastUserMsg) sendMsg(lastUserMsg);
    }

    function toggleMic() {
      if (!('webkitSpeechRecognition' in window)) {
        alert('Voice input not supported in this browser.');
        return;
      }
      if (!recognition) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
        recognition.onresult = function(event) {
          const transcript = event.results[0][0].transcript;
          sendMsg(transcript);
        };
        recognition.onend = function() {
          recognizing = false;
          micBtn.classList.remove('active');
        };
      }
      if (!recognizing) {
        recognition.start();
        recognizing = true;
        micBtn.classList.add('active');
      } else {
        recognition.stop();
        recognizing = false;
        micBtn.classList.remove('active');
      }
    }

    sendBtn.addEventListener('click', () => sendMsg());
    msgInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMsg();
    });
    micBtn.addEventListener('click', toggleMic);
    document.getElementById('copyBtn').addEventListener('click', copyChatLogs);

    setupWS();
  </script>
</body>
</html>
