
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Website Builder</title>
  <style>
    body {
      background: #181c2a;
      color: #fff;
      font-family: 'Inter', Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .main {
      max-width: 540px;
      margin: 40px auto;
      background: #23283a;
      border-radius: 18px;
      box-shadow: 0 4px 32px #0008;
      padding: 32px 24px 24px 24px;
    }
    .header h1 {
      margin: 0 0 8px 0;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: #4f8cff;
    }
    .header h2 {
      margin: 0 0 24px 0;
      font-size: 1.1rem;
      font-weight: 400;
      color: #ffb84f;
    }
    .chat-area {
      background: #20243a;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
      min-height: 320px;
      box-shadow: 0 2px 8px #0004;
    }
    .connection {
      margin-bottom: 10px;
      text-align: center;
      color: #ffb84f;
      font-size: 1.05em;
      min-height: 24px;
    }
    #chat {
      min-height: 120px;
      margin-bottom: 12px;
      max-height: 220px;
      overflow-y: auto;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #23283a;
      border-radius: 6px;
      margin: 10px 0 0 0;
      overflow: hidden;
      position: relative;
      display: none;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #4f8cff, #ffb84f);
      width: 0%;
      transition: width 0.3s;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      width: 100%;
    }
    input {
      flex: 1;
      font-size: 1rem;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #23283a;
      color: #fff;
    }
    button {
      background: #4f8cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active { background: #3461a4; }
    .mic { background: #ff4f8c; margin-left: 0; }
    .mic.active { background: #ffb84f; color: #23283a; }
    .mic svg { vertical-align: middle; }
    #copyBtn {
      margin-top: 14px;
      width: 100%;
      font-size: 1.05rem;
      background: #4f8cff;
    }
    #status {
      margin-top: 12px;
      text-align: center;
      font-size: 1.05em;
      min-height: 24px;
    }
    .bubble {
      margin: 8px 0;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 1.05rem;
      background: #2a2f4a;
      color: #fff;
      box-shadow: 0 1px 4px #0002;
      word-break: break-word;
    }
    .bubble.status { background: #23283a; color: #ffb84f; font-style: italic; }
    .bubble.error { background: #ff4f8c; color: #fff; font-weight: 600; }
    @media (max-width: 700px) {
      .main { max-width: 100vw; border-radius: 0; box-shadow: none; padding: 12px; }
      .chat-area { padding: 8px; }
      .bubble { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="header">
      <h1>AI Website Builder</h1>
      <h2>Build websites with natural language and AI</h2>
    </div>
    <div class="chat-area">
      <div class="connection" id="connectionStatus">Connecting...</div>
      <div id="chat"></div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-bar-inner" id="progressBarInner"></div>
      </div>
      <div class="input-row">
        <input id="msg" type="text" placeholder="Type your website idea or question..." autocomplete="off" />
        <button id="sendBtn">Send</button>
        <button class="mic" id="micBtn" title="Speak"><svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path d="M10 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V19a1 1 0 1 0 2 0v-1.07A7 7 0 0 0 17 11z"/></svg></button>
      </div>
      <button id="copyBtn">Copy Chat Logs</button>
      <div id="status"></div>
    </div>
  </div>

</body>
